name: рџЏ† WC2026 Predictor вЂ” Auto Update

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-predictor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: в¬‡цёЏ Checkout repository
        uses: actions/checkout@v4

      - name: рџђЌ Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: рџ“¦ Install dependencies
        run: pip install -r backend/requirements.txt

      - name: в–¶цёЏ Run Predictor
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          OPENWEATHER_KEY:  ${{ secrets.OPENWEATHER_KEY }}
        run: python backend/main.py

      - name: рџ’ѕ Commit & Push predictions
        run: |
          git config --global user.name  "WC2026-Bot рџ¤–"
          git config --global user.email "bot@wc2026-predictor.io"
          git add backend/output/predictii_avansate.json
          git diff --staged --quiet \
            || git commit -m "рџ”„ Predictions updated вЂ” $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
